name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y build-essential

    - name: Build main application
      run: g++ -o student_db main.cpp

    - name: Build tests
      run: g++ -o tests tests.cpp

    - name: Run tests
      run: ./tests

    - name: Test main application (basic functionality)
      run: |
