name: C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y build-essential

    - name: Compile main application
      run: g++ -Wall -Wextra -std=c++11 -o student_db main.cpp

    - name: Compile tests
      run: g++ -Wall -Wextra -std=c++11 -o test_runner test.cpp

    - name: Run tests
      run: ./test_runner
